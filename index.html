<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jujutsu Kaisen</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/jjk-styles.css">
</head>
<body>
  <a href="https://jjkaisen.com/" class="jjk-title"><img src="images/jjk-title.webp" alt="Jujutsu Kaisen"></a>

  <h2>Main Characters</h2>

  <div class="character-section">
    <div class="slider-row">
      <button id="prev-btn" class="nav-btn" aria-label="Previous character">
        <svg viewBox="0 0 24 24">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </button>

      <div class="character-card" id="character-card">
        <img id="character-img" alt="">
        <h3 id="character-name"></h3>
        <p id="character-desc"></p>
      </div>

      <button id="next-btn" class="nav-btn" aria-label="Next character">
        <svg viewBox="0 0 24 24">
          <path d="M9 6l6 6-6 6"/>
        </svg>
      </button>
    </div>

    <div id="dots" class="dots"></div>
    <button id="mute-btn" class="mute-btn" aria-label="Mute Gojo theme">🔊</button>
  </div>

  <h2>Volumes & Chapters</h2>
  <ul id="volume-list"></ul>

  <audio id="character-theme" preload="auto"></audio>

  <script src="volumes-chapters/volumes-chapters.js"></script>
  <script src="scripts/jjk-scripts.js"></script>
</body>
</html>
